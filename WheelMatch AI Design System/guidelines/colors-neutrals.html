<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals · slate" subtitle="Cool slate ramp for text, surfaces & borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sw { width: 78px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(15,23,42,.08); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 6px; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--slate-950)"></div><div class="name">950</div><div class="hex">#0A0F1C</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="name">900</div><div class="hex">#0F172A</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-800)"></div><div class="name">800</div><div class="hex">#1E293B</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="name">700</div><div class="hex">#334155</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><div class="name">600</div><div class="hex">#475569</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="name">500</div><div class="hex">#64748B</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="name">400</div><div class="hex">#94A3B8</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="name">300</div><div class="hex">#CBD5E1</div></div>
  </div>
  <div class="row" style="margin-top:12px">
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="name">200</div><div class="hex">#E2E8F0</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-150)"></div><div class="name">150</div><div class="hex">#EAEEF4</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="name">100</div><div class="hex">#F1F5F9</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="name">50</div><div class="hex">#F8FAFC</div></div>
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="name">white</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
