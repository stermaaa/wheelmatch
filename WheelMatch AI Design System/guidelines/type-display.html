<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="Schibsted Grotesk — tight tracking, bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-strong); padding: 22px; }
  .spec { display: flex; align-items: baseline; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--border-subtle); }
  .spec:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 130px; flex: none; }
  .d  { font-size: var(--fs-display); font-weight: 800; letter-spacing: var(--ls-tight); line-height: 1; }
  .h1 { font-size: var(--fs-h1); font-weight: 700; letter-spacing: var(--ls-tight); }
  .h2 { font-size: var(--fs-h2); font-weight: 700; letter-spacing: var(--ls-snug); }
  .h3 { font-size: var(--fs-h3); font-weight: 600; letter-spacing: var(--ls-snug); }
</style>
</head>
<body>
  <div class="spec"><span class="meta">Display · 44 / 800</span><span class="d">Matching IA</span></div>
  <div class="spec"><span class="meta">H1 · 30 / 700</span><span class="h1">Tech Lead Java / Spring Boot</span></div>
  <div class="spec"><span class="meta">H2 · 24 / 700</span><span class="h2">Analyse de la mission</span></div>
  <div class="spec"><span class="meta">H3 · 20 / 600</span><span class="h3">Compétences obligatoires</span></div>
</body>
</html>
