<!-- @dsCard group="Type" viewport="700x180" name="Mono · data & scores" subtitle="JetBrains Mono for numbers, TJM, scores" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); padding: 22px; display: flex; gap: 36px; align-items: center; }
  .big { font-family: var(--font-mono); font-weight: 700; font-size: 46px; color: var(--success-600); letter-spacing: -0.02em; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .stat { font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--text-strong); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  .pill { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--primary-700); background: var(--primary-50); padding: 4px 10px; border-radius: var(--radius-sm); display: inline-block; }
</style>
</head>
<body>
  <div style="text-align:center"><div class="big">91%</div><div class="meta">SCORE GLOBAL</div></div>
  <div class="col">
    <div class="stat">TJM&nbsp;&nbsp;650&nbsp;€</div>
    <div class="stat">12&nbsp;missions&nbsp;·&nbsp;8&nbsp;placements</div>
    <span class="pill">Java · Spring · K8s</span>
  </div>
</body>
</html>
