<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation · shadows" subtitle="Soft, layered, cool slate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); color: var(--text-body); padding: 26px; display: flex; gap: 24px; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 110px; height: 70px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-strong); margin-top: 12px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="tok">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="tok">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="tok">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="tok">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-ai)"></div><div class="tok">ai glow</div></div>
</body>
</html>
