<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); padding: 22px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 9px; }
  .bar { background: var(--primary-500); height: 16px; border-radius: var(--radius-xs); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-strong); width: 86px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-1</span><span class="bar" style="width:4px"></span><span class="val">4px</span></div>
  <div class="row"><span class="tok">space-2</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="tok">space-3</span><span class="bar" style="width:12px"></span><span class="val">12px</span></div>
  <div class="row"><span class="tok">space-4</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="tok">space-6</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="tok">space-7</span><span class="bar" style="width:32px"></span><span class="val">32px</span></div>
  <div class="row"><span class="tok">space-9</span><span class="bar" style="width:48px"></span><span class="val">48px</span></div>
</body>
</html>
