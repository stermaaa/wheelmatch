<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); color: var(--text-body); padding: 22px; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-faint); margin: 0 0 12px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 20px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Tabs, SidebarNav } = window.WheelMatchAIDesignSystem_84fa8f;
    const I = (d) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
    function Demo() {
      const [t1, setT1] = React.useState('analyse');
      const [t2, setT2] = React.useState('one');
      const [nav, setNav] = React.useState('shortlist');
      return (
        <div style={{display:'grid',gridTemplateColumns:'250px 1fr',gap:24,alignItems:'start'}}>
          <div style={{height:300,borderRadius:'var(--radius-lg)',overflow:'hidden'}}>
            <SidebarNav active={nav} onSelect={setNav}
              items={[
                {id:'dashboard',label:'Dashboard',icon:I('M3 13h8V3H3zM13 21h8V3h-8zM3 21h8v-6H3z')},
                {section:'Pipeline'},
                {id:'missions',label:'Missions',count:14,icon:I('M3 7h18v13H3zM8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2')},
                {id:'shortlist',label:'Shortlist',count:5,icon:I('M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11')},
              ]} />
          </div>
          <div>
            <p className="label">Tabs · underline</p>
            <div className="panel">
              <Tabs value={t1} onChange={setT1} tabs={[{id:'analyse',label:'Analyse'},{id:'matching',label:'Matching',count:5},{id:'cv',label:'CV généré'}]} />
            </div>
            <p className="label">Tabs · segmented</p>
            <Tabs variant="segmented" value={t2} onChange={setT2} tabs={[{id:'one',label:'One-pager'},{id:'two',label:'2 pages'},{id:'full',label:'Dossier'}]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
